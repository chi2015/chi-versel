<!DOCTYPE html>
<html>
	<head>
		<title>iTunes Top 100</title> 
		<link rel="icon" href="/itunes100/ituneslogo.png" type="image/png"/>
		<link type="text/css" rel="stylesheet" href="/itunes100/style.css?v=0906261249"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	</head>
	<body>
		<div class="main-block">
			<h1>iTunes Top 100</h1>
			<label for="choose">Select country:</label>
			<select id="choose" onchange="Router.go(this.value);">
			</select>
			<div id="list"></div>
		</div>

		<div id="sticky-player" class="itunes-sticky-player">
			<div class="itunes-sticky-row">
				<div class="itunes-sticky-rank" id="sticky-rank">#1</div>
				<div class="itunes-sticky-art-cell">
					<img id="sticky-art" class="itunes-sticky-art" alt="" src=""/>
				</div>
				<div class="itunes-sticky-info">
					<div class="itunes-sticky-info-inner">
						<span id="sticky-artist" class="itunes-sticky-artist"></span>
						<span class="itunes-sticky-sep"> &nbsp;&mdash;&nbsp; </span>
						<span id="sticky-title" class="itunes-sticky-title"></span>
					</div>
				</div>
				<div class="itunes-sticky-controls">
					<button type="button" id="sticky-prev" class="itunes-sticky-btn" onclick="stickyPrev();">Prev</button>
					<button type="button" id="sticky-play" class="itunes-sticky-btn" onclick="stickyPlay();">Pause</button>
					<button type="button" id="sticky-next" class="itunes-sticky-btn" onclick="stickyNext();">Next</button>
				</div>
			</div>
		</div>

	</body>
	<script type="text/javascript" src="/itunes100/main.js?v=0906261249"></script>
</html>
